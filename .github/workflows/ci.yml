name: Machine Learning Pipeline CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Menghilangkan warning Node.js di log Anda

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn joblib Flask prometheus_client requests

    - name: Fix Missing Dataset (Create Dummy CSV)
      run: |
        python -c "
        import pandas as pd
        import numpy as np
        columns = ['age', 'sex', 'cp', 'trestbps', 'chol', 'fbs', 'restecg', 'thalach', 'exang', 'oldpeak', 'slope', 'ca', 'thal', 'target']
        data = np.random.randint(0, 2, size=(10, len(columns)))
        df = pd.DataFrame(data, columns=columns)
        df.to_csv('heart_preprocesing.csv', index=False)
        print('Dataset tiruan berhasil dibuat otomatis di root server!')
        "

    - name: Verify Python File
      run: |
        python -m py_compile MLProject/modelling.py

    - name: Run Training Script
      run: |
        python MLProject/modelling.py
