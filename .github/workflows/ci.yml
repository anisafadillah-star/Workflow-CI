name: Machine Learning Pipeline CI

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install Dependencies
    run: |
      pip install mlflow pandas scikit-learn

  - name: Check Python Syntax
    run: |
      python -m py_compile MLProject/modelling.py

  - name: Run Training
    run: |
      python MLProject/modelling.py
